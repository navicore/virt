name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - "Sources/**/*.swift"
      - "Package.swift"

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          review_comment_on_pr: true
          prompt: |
            Review this PR for the `virt` project — a Swift CLI tool that manages
            Linux VMs on macOS using Apple's Virtualization.framework.

            Read docs/design/001-cli-vm-manager.md for the full design context.

            Check the changed files against these criteria:

            ## Virtualization.framework correctness
            - VZ objects must be created and used on the main thread / main actor
            - VZVirtualMachine lifecycle: validate → start → requestStop (with timeout) → stop
            - EFI boot requires both VZEFIBootLoader and a per-VM VZEFIVariableStore
            - Disk images used with VZVirtioBlockDeviceConfiguration should be opened
              with the correct read/write access
            - VZNATNetworkDeviceAttachment is the only NAT option — do not confuse
              with VZBridgedNetworkDeviceAttachment
            - ISO attachment uses VZUSBMassStorageDeviceConfiguration (not virtio block)
            - Console I/O via VZVirtioConsoleDeviceConfiguration must wire
              serialPort read/write file handles correctly

            ## Swift / code standards
            - Prefer `try` with proper error propagation over force-unwraps or silent failures
            - FileManager operations that return Bool must have their return value checked
            - Cleanup partial state on failure (e.g., remove VM directory if create fails partway)
            - Use `_ =` not `let _ =` for discarded results
            - Keep Codable models simple — no custom encode/decode unless necessary
            - No GUI code, no SwiftUI, no AppKit — this is a pure CLI tool
            - ArgumentParser commands should use @Argument for positional args,
              @Option for named flags, matching the CLI spec in the design doc

            ## Architecture / scope
            - VM config lives at ~/.virt/vms/<name>/config.json
            - Each VM directory contains: config.json, disk.raw, nvram.bin, vm.pid (when running)
            - Out of scope: snapshots, shared folders, GPU passthrough, clustering,
              TUI dashboards, Rosetta translation, pre-built images
            - Flag anything that adds scope beyond the design doc

            ## Review format
            Use a summary table with severity (bug / warning / nit), the issue,
            and the file. Then provide details with code snippets for each finding.

