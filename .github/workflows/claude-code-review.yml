name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for a Swift CLI + AppKit tool that manages
            Linux VMs on macOS using Apple's Virtualization.framework.

            Focus on:
            - Correctness: error handling, resource cleanup, lifecycle bugs
            - Virtualization.framework: device configuration, boot loader setup,
              serial port wiring, EFI/NVRAM handling
            - Safety: partial state cleanup on failure, PID file handling
            - Performance: unnecessary allocations, blocking the main thread

            Do NOT flag:
            - Style nits or formatting
            - Missing documentation or comments
            - Naming preferences

            Use the repository's CLAUDE.md and docs/design/ for project conventions.
            Only report issues you are confident about. Be specific — cite file paths
            and line numbers.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
